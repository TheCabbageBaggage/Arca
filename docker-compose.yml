version: '3.9'

services:
  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0 --port 5173

    ports:
      - "5173:5173"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_PATH=/data/sqlite/arca.db
    ports:
      - "3000:3000"
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./data/uploads:/data/uploads
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  backup-cron:
    image: alpine:3.20
    env_file:
      - .env
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./data/backups:/data/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    command: sh -c "apk add --no-cache bash sqlite curl tzdata && echo '0 2 * * * /bin/bash /scripts/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root && crond -f -l 8"

volumes:
  redis_data:
